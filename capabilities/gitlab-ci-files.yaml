        call: gitlab-ci-files.postapiv4projectsidrepositoryfilesfilepath
        with:
          id: rest.id
          file_path: rest.file_path
          postApiV4ProjectsIdRepositoryFilesFilePath: rest.postApiV4ProjectsIdRepositoryFilesFilePath
        outputParameters:
        - type: object
          mapping: $.
