naftiko: 1.0.0-alpha2
info:
  label: GitLab API — files
  description: 'GitLab API — files. 8 operations. Lead operation: files. Self-contained Naftiko capability covering one Gitlab
    Ci business surface.'
  tags:
  - Gitlab Ci
  - files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITLAB_CI_API_KEY: GITLAB_CI_API_KEY
capability:
  consumes:
  - type: http
    namespace: gitlab-ci-files
    baseUri: https://gitlab.com
    description: GitLab API — files business capability. Self-contained, no shared references.
    resources:
    - name: api-v4-projects-id-repository-files-file_path
      path: /api/v4/projects/{id}/repository/files/{file_path}
      operations:
      - name: headapiv4projectsidrepositoryfilesfilepath
        method: HEAD
        description: Get file metadata from repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The project ID
          required: true
        - name: file_path
          in: path
          type: string
          description: The URL-encoded path to the file.
          required: true
        - name: ref
          in: query
          type: string
          description: The name of branch, tag or commit
          required: true
      - name: getapiv4projectsidrepositoryfilesfilepath
        method: GET
        description: Get a file from the repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The project ID
          required: true
        - name: file_path
          in: path
          type: string
          description: The URL-encoded path to the file.
          required: true
        - name: ref
          in: query
          type: string
          description: The name of branch, tag or commit
          required: true
      - name: postapiv4projectsidrepositoryfilesfilepath
        method: POST
        description: Create new file in repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The project ID
          required: true
        - name: file_path
          in: path
          type: string
          description: The URL-encoded path to the file.
          required: true
        - name: postApiV4ProjectsIdRepositoryFilesFilePath
          in: body
          type: string
          required: true
      - name: putapiv4projectsidrepositoryfilesfilepath
        method: PUT
        description: Update existing file in repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The project ID
          required: true
        - name: file_path
          in: path
          type: string
          description: The URL-encoded path to the file.
          required: true
        - name: putApiV4ProjectsIdRepositoryFilesFilePath
          in: body
          type: string
          required: true
      - name: deleteapiv4projectsidrepositoryfilesfilepath
        method: DELETE
        description: Delete an existing file in repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The project ID
          required: true
        - name: file_path
          in: path
          type: string
          description: The URL-encoded path to the file.
          required: true
        - name: branch
          in: query
          type: string
          description: Name of the branch to commit into. To create a new branch, also provide `start_branch`.
          required: true
        - name: commit_message
          in: query
          type: string
          description: Commit message
          required: true
        - name: start_branch
          in: query
          type: string
          description: Name of the branch to start the new commit from
        - name: author_email
          in: query
          type: string
          description: The email of the author
        - name: author_name
          in: query
          type: string
          description: The name of the author
        - name: last_commit_id
          in: query
          type: string
          description: Last known file commit id
    - name: api-v4-projects-id-repository-files-file_path-blame
      path: /api/v4/projects/{id}/repository/files/{file_path}/blame
      operations:
      - name: headapiv4projectsidrepositoryfilesfilepathblame
        method: HEAD
        description: Get blame file metadata from repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The project ID
          required: true
        - name: file_path
          in: path
          type: string
          description: The URL-encoded path to the file.
          required: true
        - name: ref
          in: query
          type: string
          description: The name of branch, tag or commit
          required: true
      - name: getapiv4projectsidrepositoryfilesfilepathblame
        method: GET
        description: Get blame file from the repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The project ID
          required: true
        - name: file_path
          in: path
          type: string
          description: The URL-encoded path to the file.
          required: true
        - name: ref
          in: query
          type: string
          description: The name of branch, tag or commit
          required: true
        - name: range[start]
          in: query
          type: integer
          description: The first line of the range to blame
          required: true
        - name: range[end]
          in: query
          type: integer
          description: The last line of the range to blame
          required: true
    - name: api-v4-projects-id-repository-files-file_path-raw
      path: /api/v4/projects/{id}/repository/files/{file_path}/raw
      operations:
      - name: getapiv4projectsidrepositoryfilesfilepathraw
        method: GET
        description: Get raw file contents from the repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The project ID
          required: true
        - name: file_path
          in: path
          type: string
          description: The URL-encoded path to the file.
          required: true
        - name: ref
          in: query
          type: string
          description: The name of branch, tag or commit
        - name: lfs
          in: query
          type: boolean
          description: Retrieve binary data for a file that is an lfs pointer
  exposes:
  - type: rest
    namespace: gitlab-ci-files-rest
    port: 8080
    description: REST adapter for GitLab API — files. One Spectral-compliant resource per consumed operation, prefixed with
