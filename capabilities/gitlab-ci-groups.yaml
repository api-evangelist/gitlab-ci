        name: getapiv4groups
        description: Get a groups list
        call: gitlab-ci-groups.getapiv4groups
        with:
          statistics: rest.statistics
          archived: rest.archived
          skip_groups: rest.skip_groups
          all_available: rest.all_available
          visibility: rest.visibility
          search: rest.search
          owned: rest.owned
          order_by: rest.order_by
          sort: rest.sort
          min_access_level: rest.min_access_level
          top_level_only: rest.top_level_only
          marked_for_deletion_on: rest.marked_for_deletion_on
          active: rest.active
          repository_storage: rest.repository_storage
          page: rest.page
          per_page: rest.per_page
          with_custom_attributes: rest.with_custom_attributes
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postapiv4groups
        description: Create a group. Available only for users who can create groups.
        call: gitlab-ci-groups.postapiv4groups
        with:
          postApiV4Groups: rest.postApiV4Groups
        outputParameters:
        - type: object
          mapping: $.
