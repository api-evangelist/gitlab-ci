naftiko: 1.0.0-alpha2
info:
  label: GitLab API — keys
  description: 'GitLab API — keys. 5 operations. Lead operation: Get a list of Groups::SshCertificate for a Group.. Self-contained
    Naftiko capability covering one Gitlab Ci business surface.'
  tags:
  - Gitlab Ci
  - keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITLAB_CI_API_KEY: GITLAB_CI_API_KEY
capability:
  consumes:
  - type: http
    namespace: gitlab-ci-keys
    baseUri: https://gitlab.com
    description: GitLab API — keys business capability. Self-contained, no shared references.
    resources:
    - name: api-v4-groups-id-ssh_certificates
      path: /api/v4/groups/{id}/ssh_certificates
      operations:
      - name: getapiv4groupsidsshcertificates
        method: GET
        description: Get a list of Groups::SshCertificate for a Group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Current page number
        - name: per_page
          in: query
          type: integer
          description: Number of items per page
        - name: id
          in: path
          type: integer
          required: true
      - name: postapiv4groupsidsshcertificates
        method: POST
        description: Add a Groups::SshCertificate.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        - name: postApiV4GroupsIdSshCertificates
          in: body
          type: string
          required: true
    - name: api-v4-groups-id-ssh_certificates-ssh_certificates_id
      path: /api/v4/groups/{id}/ssh_certificates/{ssh_certificates_id}
      operations:
      - name: deleteapiv4groupsidsshcertificatessshcertificatesid
        method: DELETE
        description: Removes an ssh certificate from a group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        - name: ssh_certificates_id
          in: path
          type: integer
          required: true
    - name: api-v4-keys
      path: /api/v4/keys
      operations:
      - name: getapiv4keys
        method: GET
        description: Get user by fingerprint of SSH key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fingerprint
          in: query
          type: string
          description: The fingerprint of an SSH key
          required: true
    - name: api-v4-keys-id
      path: /api/v4/keys/{id}
      operations:
      - name: getapiv4keysid
        method: GET
        description: Get single ssh key by id. Only available to admin users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of an SSH key
          required: true
  exposes:
  - type: rest
    namespace: gitlab-ci-keys-rest
    port: 8080
    description: REST adapter for GitLab API — keys. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v4/groups/{id}/ssh-certificates
      name: api-v4-groups-id-ssh-certificates
      description: REST surface for api-v4-groups-id-ssh_certificates.
      operations:
      - method: GET
        name: getapiv4groupsidsshcertificates
        description: Get a list of Groups::SshCertificate for a Group.
        call: gitlab-ci-keys.getapiv4groupsidsshcertificates
        with:
          page: rest.page
          per_page: rest.per_page
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postapiv4groupsidsshcertificates
        description: Add a Groups::SshCertificate.
        call: gitlab-ci-keys.postapiv4groupsidsshcertificates
        with:
          id: rest.id
          postApiV4GroupsIdSshCertificates: rest.postApiV4GroupsIdSshCertificates
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v4/groups/{id}/ssh-certificates/{ssh-certificates-id}
      name: api-v4-groups-id-ssh-certificates-ssh-certificates-id
      description: REST surface for api-v4-groups-id-ssh_certificates-ssh_certificates_id.
      operations:
      - method: DELETE
        name: deleteapiv4groupsidsshcertificatessshcertificatesid
        description: Removes an ssh certificate from a group.
        call: gitlab-ci-keys.deleteapiv4groupsidsshcertificatessshcertificatesid
        with:
          id: rest.id
          ssh_certificates_id: rest.ssh_certificates_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v4/keys
      name: api-v4-keys
      description: REST surface for api-v4-keys.
      operations:
      - method: GET
        name: getapiv4keys
        description: Get user by fingerprint of SSH key
        call: gitlab-ci-keys.getapiv4keys
        with:
          fingerprint: rest.fingerprint
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v4/keys/{id}
      name: api-v4-keys-id
      description: REST surface for api-v4-keys-id.
      operations:
      - method: GET
        name: getapiv4keysid
        description: Get single ssh key by id. Only available to admin users
        call: gitlab-ci-keys.getapiv4keysid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gitlab-ci-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitLab API — keys. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-list-groups-sshcertificate-group
      description: Get a list of Groups::SshCertificate for a Group.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gitlab-ci-keys.getapiv4groupsidsshcertificates
      with:
        page: tools.page
        per_page: tools.per_page
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: add-groups-sshcertificate
      description: Add a Groups::SshCertificate.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gitlab-ci-keys.postapiv4groupsidsshcertificates
      with:
        id: tools.id
        postApiV4GroupsIdSshCertificates: tools.postApiV4GroupsIdSshCertificates
      outputParameters:
      - type: object
        mapping: $.
    - name: removes-ssh-certificate-group
      description: Removes an ssh certificate from a group.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gitlab-ci-keys.deleteapiv4groupsidsshcertificatessshcertificatesid
      with:
        id: tools.id
        ssh_certificates_id: tools.ssh_certificates_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user-fingerprint-ssh-key
      description: Get user by fingerprint of SSH key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gitlab-ci-keys.getapiv4keys
      with:
        fingerprint: tools.fingerprint
      outputParameters:
      - type: object
        mapping: $.
    - name: get-single-ssh-key-id
      description: Get single ssh key by id. Only available to admin users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gitlab-ci-keys.getapiv4keysid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
