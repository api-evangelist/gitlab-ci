        author: tools.author
        all: tools.all
        with_stats: tools.with_stats
        first_parent: tools.first_parent
        order: tools.order
        trailers: tools.trailers
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
