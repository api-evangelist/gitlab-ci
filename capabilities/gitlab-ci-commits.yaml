        idempotent: false
      call: gitlab-ci-commits.postapiv4projectsidrepositorycommitsshacherrypick
      with:
        id: tools.id
        sha: tools.sha
        postApiV4ProjectsIdRepositoryCommitsShaCherryPick: tools.postApiV4ProjectsIdRepositoryCommitsShaCherryPick
