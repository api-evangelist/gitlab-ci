    tools:
    - name: get-project-repository-commits
      description: Get a project repository commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gitlab-ci-commits.getapiv4projectsidrepositorycommits
      with:
        id: tools.id
        ref_name: tools.ref_name
