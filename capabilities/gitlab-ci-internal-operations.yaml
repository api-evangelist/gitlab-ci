naftiko: 1.0.0-alpha2
info:
  label: GitLab API — internal_operations
  description: 'GitLab API — internal_operations. 2 operations. Lead operation: Process Slack interaction events. Self-contained
    Naftiko capability covering one Gitlab Ci business surface.'
  tags:
  - Gitlab Ci
  - internal_operations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITLAB_CI_API_KEY: GITLAB_CI_API_KEY
capability:
  consumes:
  - type: http
    namespace: gitlab-ci-internal-operations
    baseUri: https://gitlab.com
    description: GitLab API — internal_operations business capability. Self-contained, no shared references.
    resources:
    - name: api-v4-integrations-slack-interactions
      path: /api/v4/integrations/slack/interactions
      operations:
      - name: postapiv4integrationsslackinteractions
        method: POST
        description: Process Slack interaction events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v4-integrations-slack-options
      path: /api/v4/integrations/slack/options
      operations:
      - name: postapiv4integrationsslackoptions
        method: POST
        description: Get Slack interactive component options
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: gitlab-ci-internal-operations-rest
    port: 8080
    description: REST adapter for GitLab API — internal_operations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v4/integrations/slack/interactions
      name: api-v4-integrations-slack-interactions
      description: REST surface for api-v4-integrations-slack-interactions.
      operations:
      - method: POST
        name: postapiv4integrationsslackinteractions
        description: Process Slack interaction events
        call: gitlab-ci-internal-operations.postapiv4integrationsslackinteractions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v4/integrations/slack/options
      name: api-v4-integrations-slack-options
      description: REST surface for api-v4-integrations-slack-options.
      operations:
      - method: POST
        name: postapiv4integrationsslackoptions
        description: Get Slack interactive component options
        call: gitlab-ci-internal-operations.postapiv4integrationsslackoptions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gitlab-ci-internal-operations-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitLab API — internal_operations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: process-slack-interaction-events
      description: Process Slack interaction events
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gitlab-ci-internal-operations.postapiv4integrationsslackinteractions
      outputParameters:
      - type: object
        mapping: $.
    - name: get-slack-interactive-component-options
      description: Get Slack interactive component options
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: gitlab-ci-internal-operations.postapiv4integrationsslackoptions
      outputParameters:
      - type: object
        mapping: $.
