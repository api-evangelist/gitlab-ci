        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID or URL-encoded path of the project owned by the authenticated user
          required: true
        - name: deployment_id
          in: path
          type: integer
          required: true
        - name: putApiV4ProjectsIdDeploymentsDeploymentId
          in: body
          type: string
          required: true
      - name: deleteapiv4projectsiddeploymentsdeploymentid
        method: DELETE
        description: Delete a specific deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID or URL-encoded path of the project owned by the authenticated user
          required: true
        - name: deployment_id
          in: path
          type: integer
          description: The ID of the deployment
          required: true
    - name: api-v4-projects-id-deployments-deployment_id-approval
      path: /api/v4/projects/{id}/deployments/{deployment_id}/approval
      operations:
      - name: postapiv4projectsiddeploymentsdeploymentidapproval
        method: POST
        description: Approve or reject a blocked deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
