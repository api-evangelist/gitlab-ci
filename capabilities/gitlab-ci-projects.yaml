  exposes:
  - type: rest
    namespace: gitlab-ci-projects-rest
    port: 8080
    description: REST adapter for GitLab API — projects. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v4/projects
      name: api-v4-projects
      description: REST surface for api-v4-projects.
      operations:
      - method: GET
        name: getapiv4projects
        description: Get a list of visible projects for authenticated user
        call: gitlab-ci-projects.getapiv4projects
        with:
          order_by: rest.order_by
          sort: rest.sort
          archived: rest.archived
          visibility: rest.visibility
          search: rest.search
          search_namespaces: rest.search_namespaces
          owned: rest.owned
          starred: rest.starred
          imported: rest.imported
          membership: rest.membership
          with_issues_enabled: rest.with_issues_enabled
          with_merge_requests_enabled: rest.with_merge_requests_enabled
          with_programming_language: rest.with_programming_language
          min_access_level: rest.min_access_level
          id_after: rest.id_after
          id_before: rest.id_before
          last_activity_after: rest.last_activity_after
          last_activity_before: rest.last_activity_before
          repository_storage: rest.repository_storage
          topic: rest.topic
          topic_id: rest.topic_id
          updated_before: rest.updated_before
          updated_after: rest.updated_after
          include_pending_delete: rest.include_pending_delete
          marked_for_deletion_on: rest.marked_for_deletion_on
          active: rest.active
          wiki_checksum_failed: rest.wiki_checksum_failed
          repository_checksum_failed: rest.repository_checksum_failed
          include_hidden: rest.include_hidden
          page: rest.page
          per_page: rest.per_page
          simple: rest.simple
          statistics: rest.statistics
          with_custom_attributes: rest.with_custom_attributes
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postapiv4projects
        description: Create new project
        call: gitlab-ci-projects.postapiv4projects
        with:
          postApiV4Projects: rest.postApiV4Projects
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v4/projects/user/{user-id}
      name: api-v4-projects-user-user-id
      description: REST surface for api-v4-projects-user-user_id.
      operations:
      - method: POST
        name: postapiv4projectsuseruserid
        description: Create new project for a specified user. Only available to admin users.
        call: gitlab-ci-projects.postapiv4projectsuseruserid
        with:
          user_id: rest.user_id
          postApiV4ProjectsUserUserId: rest.postApiV4ProjectsUserUserId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v4/projects/{id}
      name: api-v4-projects-id
      description: REST surface for api-v4-projects-id.
      operations:
      - method: GET
        name: getapiv4projectsid
        description: Get a single project
        call: gitlab-ci-projects.getapiv4projectsid
        with:
          id: rest.id
          statistics: rest.statistics
          with_custom_attributes: rest.with_custom_attributes
          license: rest.license
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putapiv4projectsid
        description: Update an existing project
        call: gitlab-ci-projects.putapiv4projectsid
        with:
          id: rest.id
          putApiV4ProjectsId: rest.putApiV4ProjectsId
        outputParameters:
        - type: object
          mapping: $.
