aid: gitlab-ci
url: https://raw.githubusercontent.com/api-evangelist/gitlab-ci/refs/heads/main/apis.yml
name: GitLab CI/CD
kind: company
description: GitLab CI/CD is the built-in continuous integration, delivery and deployment platform for GitLab. The CI/CD surface
  area within GitLab's REST API v4 covers pipelines, jobs, pipeline schedules, pipeline triggers, runners, agents, releases,
  environments, deployments, package and container registries, and the security/dependency scanners. GitLab also exposes a
  GraphQL API.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- DevOps
- CI/CD
- Pipelines
- GitLab
- DevSecOps
- Runners
- Container Registry
created: '2026-05-08'
modified: '2026-05-19'
specificationVersion: '0.19'
apis:
- aid: gitlab-ci:rest-v4
  name: GitLab REST API v4 (CI/CD endpoints)
  description: GitLab REST API v4. CI/CD-related endpoint families include /projects/:id/ pipelines, /projects/:id/jobs, /projects/:id/pipeline_schedules,
    /projects/:id/triggers, /runners, /projects/:id/runners, /projects/:id/environments, /projects/:id/deployments and the
    /projects/:id/releases family. Authenticated with personal access tokens, OAuth tokens, project access tokens, group access
    tokens, CI job tokens or trigger tokens.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://docs.gitlab.com/api/
  baseURL: https://gitlab.com/api/v4
